version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: media_postgres
    environment:
      POSTGRES_USER: media
      POSTGRES_PASSWORD: media
      POSTGRES_DB: media_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: media_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: